<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="frontend/icons/favicon.ico" />
  <link rel="icon" type="image/png" href="frontend/icons/logoprojetosacad.png" />
  <link rel="apple-touch-icon" href="frontend/icons/logoprojetosacad.png" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <title>Projetos Acadêmicos</title>
</head>

<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="mb-2">Projetos Acadêmicos</h1>
      <p class="text-muted">Visualize e cadastre projetos desenvolvidos na faculdade</p>
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo projeto</h2>

        <form id="project-form">
          <input type="hidden" id="project-id" />

          <div class="mb-3">
            <label for="title" class="form-label">Título do projeto</label>
            <input type="text" id="title" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Descrição</label>
            <textarea id="description" rows="4" class="form-control" required></textarea>
          </div>

          <div class="mb-3">
            <label for="technologies" class="form-label">Tecnologias utilizadas</label>
            <input type="text" id="technologies" class="form-control" placeholder="Ex: HTML, CSS, JavaScript, MongoDB"
              required />
          </div>

          <div class="mb-3">
            <label for="softSkills" class="form-label">Soft skills desenvolvidas</label>
            <input type="text" id="softSkills" class="form-control"
              placeholder="Ex: Trabalho em equipe, Comunicação, Organização" required />
          </div>

          <div class="mb-3">
            <label for="professor" class="form-label">Professor responsável</label>
            <input type="text" id="professor" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="semester" class="form-label">Período / semestre</label>
            <input type="text" id="semester" class="form-control" placeholder="Ex: 3º período / 2026.1" required />
          </div>

          <div class="mb-3">
            <label for="teamMembers" class="form-label">Integrantes e funções</label>
            <textarea id="teamMembers" rows="5" class="form-control" placeholder="Ex:
Vitória - Front-end
Renan - Back-end
Lucas - Banco de Dados" required></textarea>
          </div>

          <div class="mb-3">
            <label for="coverImage" class="form-label">Foto de capa</label>
            <input type="file" id="coverImage" class="form-control" accept="image/*" />
          </div>

          <div class="mb-3">
            <div id="image-preview" class="preview-box">Nenhuma imagem selecionada</div>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar edição</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0"></p>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h2 class="h4 mb-0">Projetos cadastrados</h2>

          <button id="reload-btn" class="refresh-btn" type="button" aria-label="Atualizar projetos"
            title="Atualizar projetos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M21 3v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <div id="projects-list"></div>
      </div>
    </section>
  </div>


  <div id="image-modal" class="image-modal hidden">
    <button type="button" class="image-modal-close" onclick="closeImageModal()" aria-label="Fechar imagem">
      ×
    </button>
    <img id="image-modal-content" class="image-modal-content" alt="Imagem ampliada do projeto">
  </div>

  <script src="app.js"></script>
</body>

</html>
